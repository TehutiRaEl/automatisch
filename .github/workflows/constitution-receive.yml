name: Constitution Receive
on:
  repository_dispatch:
    types: [constitution_update]

jobs:
  sync-constitution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download soul.md from Queen
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/tehutirael/sovereign-hive-meta/main/soul.md" \
            -o /tmp/soul_new.md

      - name: Commit if changed
        run: |
          if [ ! -f soul.md ] || ! diff -q /tmp/soul_new.md soul.md > /dev/null 2>&1; then
            cp /tmp/soul_new.md soul.md
            git config user.name "hive-bot"
            git config user.email "hive-bot@sovereign-hive"
            git add soul.md
            git commit -m "chore: sync constitution from Queen [skip ci]"
            git push
          else
            echo "Constitution already up to date"
          fi
