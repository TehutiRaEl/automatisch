name: Constitution Sync
on:
  repository_dispatch:
    types: [constitution_update]
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.COLONY_DISPATCH_TOKEN }}
          ref: main
      - name: Update soul.md
        run: |
          echo "${{ github.event.client_payload.soul_md }}" > soul.md
          git config user.name "Sovereign Hive"
          git config user.email "hive@sovereign-hive.local"
          git add soul.md
          git diff --cached --quiet || git commit -m "chore: constitution sync — update soul.md from Queen"
          git push
